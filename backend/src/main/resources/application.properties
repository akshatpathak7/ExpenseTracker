spring.application.name=expense-tracker

# In-memory H2 database (data resets when the app restarts)
spring.datasource.url=jdbc:h2:mem:expenses
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the table from the Expense entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Browse the database at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:expenses)
spring.h2.console.enabled=true
